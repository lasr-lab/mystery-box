defaults:
  - data: digit_fabrics
  - model: efficientnet_b0
  - trainer: default
  - wandb: max
  - demo: ~
  - datacollection: ~
  - _self_

project:
  name: SECAI_demo_tactile
  seed: 42

experiment_name: ${project.name}_${model.name}

paths:
  data_dir: ${hydra:runtime.cwd}/data
  raw_data_dir: ${paths.data_dir}/raw
  processed_data_dir: ${paths.data_dir}/processed
  external_data_dir: ${paths.data_dir}/external
  output_dir: ${hydra:runtime.output_dir}

hydra:
  run:
    dir: outputs/${now:%m_%d}_${oc.select:model.name,model}_${oc.select:data.num_classes,numclasses}_${now:%H%M%S}
