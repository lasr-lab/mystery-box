name: tactile_demo
# Shared runtime settings for the retained OpenCV and PySide6 frontends.
model_checkpoint: ${hydra:runtime.cwd}/models/${model.name}.pt
device: auto

sensor:
  device_name: DIGIT
  device_path: null
  backend: CAP_V4L2
  # roberto recommended setting framerate to 20 or 25 to avoid shifting
  # but this is not supported
  # v4l2-ctl -d /dev/video2 --list-formats-ext
  # this says it only supports 30 or 60 fps.
  fps: 30 # valid options are 30,60
  width: 320
  height: 240
  fourcc: YUYV
  warmup_frames: 5

gui:
  window_name: DIGIT Tactile Demo
  wait_key_delay_ms: 1
  display_scale: 2.0
  side_panel_width: 360

aggregate_window_frames: 30
show_sensor_preview: true
