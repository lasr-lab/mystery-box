name: digit_fabrics
sensor: DIGIT
dataset_dir: digit_fabrics
num_classes: 7
seed: 42
classes:
  - nothing
  - cotton
  - wool
  - curdory
  - synthetic_leather
  - teddy
  - flower_fabric

input:
  color_channels: 3
  height: 240
  width: 320

samples_per_class: 1000

split:
  train: 0.7
  val: 0.15
  test: 0.15

normalization:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

augmentations:
  enabled: true
  horizontal_flip: true
  horizontal_flip_p: 0.5
