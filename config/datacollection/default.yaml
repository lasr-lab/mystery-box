name: digit_image_collector
target_dir: ${paths.raw_data_dir}/digit_fabrics
manifest_filename: manifest.csv

sensor:
  # Prefer matching the Linux V4L2 device name so the built-in webcam is not
  # selected when camera indexes change.
  device_name: DIGIT
  device_path: null
  camera_index: 0
  backend: null
  fps: 30
  width: 320
  height: 240
  fourcc: MJPG
  warmup_frames: 5
  enforce_frame_size: true

gui:
  window_name: DIGIT data collector
  wait_key_delay_ms: 1
  show_overlay: true

capture:
  image_extension: jpg
  jpg_quality: 95
  png_compression: 3
  save_manifest: true

labels:
  "0":
    class_name: nothing
    display_name: no contact
  "1":
    class_name: cotton
    display_name: cotton
  "2":
    class_name: wool
    display_name: wool
  "3":
    class_name: curdory
    display_name: curdory
  "4":
    class_name: synthetic_leather
    display_name: synthetic leather
  "5":
    class_name: teddy
    display_name: teddy
  "6":
    class_name: flower_fabric
    display_name: flower fabric
