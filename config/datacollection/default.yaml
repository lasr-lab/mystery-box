name: digit_image_collector
target_dir: ${paths.raw_data_dir}/digit_fabrics

sensor:
  device_name: DIGIT
  device_path: null
  backend: CAP_V4L2
  fps: 30
  width: 320
  height: 240
  fourcc: YUYV
  warmup_frames: 5

gui:
  window_name: DIGIT data collector
  wait_key_delay_ms: 1
  display_scale: 2
  side_panel_width: 240

labels:
  "0":
    class_name: nothing
    display_name: no contact
  "1":
    class_name: cotton
    display_name: cotton
  "2":
    class_name: wool
    display_name: wool
  "3":
    class_name: curdory
    display_name: curdory
  "4":
    class_name: synthetic_leather
    display_name: synthetic leather
  "5":
    class_name: teddy
    display_name: teddy
  "6":
    class_name: flower_fabric
    display_name: flower fabric
